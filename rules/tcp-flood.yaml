# Predefined: TCP flood mitigations, victim-side.
#
# Burst detection: these fire only when traffic SPIKES above that descriptor's own
# recent baseline AND clears an absolute floor (pps > 5 * pps_base and pps > floor),
# so a steadily busy server is not dropped — this matters most for ACK, since
# legitimate established traffic is itself "ack !syn".
#
# Diversity gate: victim rules require the flood to come from a SPREAD of source IPs
# (ratio_detection on src, 30%), so a single high-rate source (often legitimate, and
# easily blocked by hand) does not trip them — only a genuinely distributed flood.
# The host-wide rules are kept ABSOLUTE and UNGATED as a catch-all backstop (incl.
# single-source extremes and the baseline warm-up).
#
# Scopes: per host (dst /32//128, pool 100) and per subnet (dst /24//48, pool 30).
rules:
  # --- SYN flood, per destination port ---
  - name: syn-flood-ipv4
    match: { family: ipv4, proto: tcp, tcp_flags: "syn !ack" }
    aggregate: { proto: exact, src: "/0", dst: "/32", src_port: all, dst_port: exact }
    ratio_detection: [ { name: src, min_ratio: 30 } ]   # require many distinct sources
    rank: pps
    history:
      fine:   { resolution: 1s, duration: 10m }
      medium: { resolution: 1m, duration: 1h }
      max_instances: 100
    trigger:
      terms:
        pps:      { metric: pps, window: 10s }
        pps_base: { metric: pps, window: 5m, offset: 1m }
      expr: "pps > 5 * pps_base and pps > 20000"
      sustained: 5s
    flowspec: { action: drop, ttl: 300s, refresh: true }
    description: "tcp syn flood to {{dst}} dport={{dst_port}}, pps={{pps}}"

  - name: syn-flood-ipv6
    match: { family: ipv6, proto: tcp, tcp_flags: "syn !ack" }
    aggregate: { proto: exact, src: "/0", dst: "/128", src_port: all, dst_port: exact }
    ratio_detection: [ { name: src, min_ratio: 30 } ]
    rank: pps
    history:
      fine:   { resolution: 1s, duration: 10m }
      medium: { resolution: 1m, duration: 1h }
      max_instances: 100
    trigger:
      terms:
        pps:      { metric: pps, window: 10s }
        pps_base: { metric: pps, window: 5m, offset: 1m }
      expr: "pps > 5 * pps_base and pps > 20000"
      sustained: 5s
    flowspec: { action: drop, ttl: 300s, refresh: true }
    description: "tcp syn flood to {{dst}} dport={{dst_port}}, pps={{pps}}"

  # --- SYN flood, per SUBNET + destination port (carpet bomb). Gate on dst spread
  # across the /24 (NOT src — carpets often come from few sources). ---
  - name: syn-flood-subnet-ipv4
    match: { family: ipv4, proto: tcp, tcp_flags: "syn !ack" }
    aggregate: { proto: exact, src: "/0", dst: "/24", src_port: all, dst_port: exact }
    ratio_detection: [ { name: dst, min_ratio: 30 } ]
    rank: pps
    history:
      fine:   { resolution: 1s, duration: 10m }
      medium: { resolution: 1m, duration: 1h }
      max_instances: 30
    trigger:
      terms:
        pps:      { metric: pps, window: 10s }
        pps_base: { metric: pps, window: 5m, offset: 1m }
      expr: "pps > 5 * pps_base and pps > 40000"
      sustained: 5s
    flowspec: { action: drop, ttl: 300s, refresh: true }
    description: "carpet tcp syn flood on {{dst}} dport={{dst_port}}, pps={{pps}}"

  - name: syn-flood-subnet-ipv6
    match: { family: ipv6, proto: tcp, tcp_flags: "syn !ack" }
    aggregate: { proto: exact, src: "/0", dst: "/48", src_port: all, dst_port: exact }
    ratio_detection: [ { name: dst, min_ratio: 30 } ]
    rank: pps
    history:
      fine:   { resolution: 1s, duration: 10m }
      medium: { resolution: 1m, duration: 1h }
      max_instances: 30
    trigger:
      terms:
        pps:      { metric: pps, window: 10s }
        pps_base: { metric: pps, window: 5m, offset: 1m }
      expr: "pps > 5 * pps_base and pps > 40000"
      sustained: 5s
    flowspec: { action: drop, ttl: 300s, refresh: true }
    description: "carpet tcp syn flood on {{dst}} dport={{dst_port}}, pps={{pps}}"

  # --- SYN flood, host-wide emergency. ABSOLUTE + UNGATED backstop. ---
  - name: syn-flood-host-ipv4
    match: { family: ipv4, proto: tcp, tcp_flags: "syn !ack" }
    aggregate: { proto: exact, src: "/0", dst: "/32", src_port: all, dst_port: all }
    rank: pps
    history: { fine: { resolution: 1s, duration: 10m }, max_instances: 30 }
    trigger:
      terms:
        pps: { metric: pps, window: 10s }
      expr: "pps > 100000"
      sustained: 5s
    flowspec: { action: drop, ttl: 180s, refresh: true }
    description: "host-wide tcp syn flood to {{dst}}, pps={{pps}}"

  - name: syn-flood-host-ipv6
    match: { family: ipv6, proto: tcp, tcp_flags: "syn !ack" }
    aggregate: { proto: exact, src: "/0", dst: "/128", src_port: all, dst_port: all }
    rank: pps
    history: { fine: { resolution: 1s, duration: 10m }, max_instances: 30 }
    trigger:
      terms:
        pps: { metric: pps, window: 10s }
      expr: "pps > 100000"
      sustained: 5s
    flowspec: { action: drop, ttl: 180s, refresh: true }
    description: "host-wide tcp syn flood to {{dst}}, pps={{pps}}"

  # --- SYN/ACK reflection (backscatter) ---
  - name: synack-flood-ipv4
    match: { family: ipv4, proto: tcp, tcp_flags: "syn ack" }
    aggregate: { proto: exact, src: "/0", dst: "/32", src_port: all, dst_port: all }
    ratio_detection: [ { name: src, min_ratio: 30 } ]
    rank: pps
    history:
      fine:   { resolution: 1s, duration: 10m }
      medium: { resolution: 1m, duration: 1h }
      max_instances: 30
    trigger:
      terms:
        pps:      { metric: pps, window: 10s }
        pps_base: { metric: pps, window: 5m, offset: 1m }
      expr: "pps > 5 * pps_base and pps > 30000"
      sustained: 5s
    flowspec: { action: drop, ttl: 180s, refresh: true }
    description: "tcp syn-ack reflection to {{dst}}, pps={{pps}}"

  - name: synack-flood-ipv6
    match: { family: ipv6, proto: tcp, tcp_flags: "syn ack" }
    aggregate: { proto: exact, src: "/0", dst: "/128", src_port: all, dst_port: all }
    ratio_detection: [ { name: src, min_ratio: 30 } ]
    rank: pps
    history:
      fine:   { resolution: 1s, duration: 10m }
      medium: { resolution: 1m, duration: 1h }
      max_instances: 30
    trigger:
      terms:
        pps:      { metric: pps, window: 10s }
        pps_base: { metric: pps, window: 5m, offset: 1m }
      expr: "pps > 5 * pps_base and pps > 30000"
      sustained: 5s
    flowspec: { action: drop, ttl: 180s, refresh: true }
    description: "tcp syn-ack reflection to {{dst}}, pps={{pps}}"

  # --- ACK flood. Established traffic is itself ack!syn, so the spike test + the
  # source-diversity gate together avoid dropping a busy server. ---
  - name: ack-flood-ipv4
    match: { family: ipv4, proto: tcp, tcp_flags: "ack !syn" }
    aggregate: { proto: exact, src: "/0", dst: "/32", src_port: all, dst_port: all }
    ratio_detection: [ { name: src, min_ratio: 30 } ]
    rank: pps
    history:
      fine:   { resolution: 1s, duration: 10m }
      medium: { resolution: 1m, duration: 1h }
      max_instances: 30
    trigger:
      terms:
        pps:      { metric: pps, window: 10s }
        pps_base: { metric: pps, window: 5m, offset: 1m }
      expr: "pps > 5 * pps_base and pps > 100000"
      sustained: 5s
    flowspec: { action: drop, ttl: 120s, refresh: true }
    description: "tcp ack flood to {{dst}}, pps={{pps}}"

  - name: ack-flood-ipv6
    match: { family: ipv6, proto: tcp, tcp_flags: "ack !syn" }
    aggregate: { proto: exact, src: "/0", dst: "/128", src_port: all, dst_port: all }
    ratio_detection: [ { name: src, min_ratio: 30 } ]
    rank: pps
    history:
      fine:   { resolution: 1s, duration: 10m }
      medium: { resolution: 1m, duration: 1h }
      max_instances: 30
    trigger:
      terms:
        pps:      { metric: pps, window: 10s }
        pps_base: { metric: pps, window: 5m, offset: 1m }
      expr: "pps > 5 * pps_base and pps > 100000"
      sustained: 5s
    flowspec: { action: drop, ttl: 120s, refresh: true }
    description: "tcp ack flood to {{dst}}, pps={{pps}}"

  # --- RST flood ---
  - name: rst-flood-ipv4
    match: { family: ipv4, proto: tcp, tcp_flags: "rst" }
    aggregate: { proto: exact, src: "/0", dst: "/32", src_port: all, dst_port: all }
    ratio_detection: [ { name: src, min_ratio: 30 } ]
    rank: pps
    history:
      fine:   { resolution: 1s, duration: 10m }
      medium: { resolution: 1m, duration: 1h }
      max_instances: 30
    trigger:
      terms:
        pps:      { metric: pps, window: 10s }
        pps_base: { metric: pps, window: 5m, offset: 1m }
      expr: "pps > 5 * pps_base and pps > 50000"
      sustained: 5s
    flowspec: { action: drop, ttl: 180s, refresh: true }
    description: "tcp rst flood to {{dst}}, pps={{pps}}"

  - name: rst-flood-ipv6
    match: { family: ipv6, proto: tcp, tcp_flags: "rst" }
    aggregate: { proto: exact, src: "/0", dst: "/128", src_port: all, dst_port: all }
    ratio_detection: [ { name: src, min_ratio: 30 } ]
    rank: pps
    history:
      fine:   { resolution: 1s, duration: 10m }
      medium: { resolution: 1m, duration: 1h }
      max_instances: 30
    trigger:
      terms:
        pps:      { metric: pps, window: 10s }
        pps_base: { metric: pps, window: 5m, offset: 1m }
      expr: "pps > 5 * pps_base and pps > 50000"
      sustained: 5s
    flowspec: { action: drop, ttl: 180s, refresh: true }
    description: "tcp rst flood to {{dst}}, pps={{pps}}"
