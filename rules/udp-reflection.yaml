# Predefined: UDP reflection/amplification. A reflector answers a spoofed request
# with a large response aimed at the victim, so on the wire we see
# `udp, src_port = <service port>, dst = victim`. Identity is the VICTIM (dst) plus
# the reflector SERVICE PORT (src_port exact); the reflector address itself varies
# and is collapsed. Rank by bps (amplification = volume) and emit a precise
# "drop udp src_port <service> -> victim" so only the attack vector is shed.
#
# One rule covers the common reflector ports; a second carries a lower floor for
# the extreme amplifiers (CharGEN/QOTD/memcached). bps thresholds are per-victim
# and sampled — tune to your link sizes. max_instances: broad list -> 100,
# narrow high-amp list -> 50.
rules:
  # Common reflection source ports: QOTD(17) CharGEN(19) DNS(53) TFTP(69)
  # Portmap(111) NTP(123) NetBIOS(137/138) SNMP(161) CLDAP(389) RIPv1(520)
  # MS-SQL(1434) L2TP(1701) SSDP(1900) ARMS(3283) RDP(3389) STUN(3478)
  # WS-Discovery(3702) mDNS(5353) CoAP(5683) Ubiquiti(10001) memcached(11211)
  # BACnet(47808).
  - name: udp-reflection-ipv4
    match:
      family: ipv4
      proto: udp
      src_port: [17, 19, 53, 69, 111, 123, 137, 138, 161, 389, 520, 1434, 1701, 1900, 3283, 3389, 3478, 3702, 5353, 5683, 10001, 11211, 47808]
    aggregate: { proto: exact, src: "/0", dst: "/32", src_port: exact, dst_port: all }
    rank: rate
    history:
      fine: { resolution: 1s, duration: 10m }
      max_instances: 100
    trigger:
      terms:
        rate: { metric: bps, window: 10s }
      expr: "rate > 100000000"   # 100 Mbps to one victim from one reflector service
      sustained: 10s
    flowspec: { action: drop, ttl: 600s, refresh: true }
    description: "udp reflection to {{dst}} sport={{src_port}}, bps={{rate}}"

  - name: udp-reflection-ipv6
    match:
      family: ipv6
      proto: udp
      src_port: [17, 19, 53, 69, 111, 123, 137, 138, 161, 389, 520, 1434, 1701, 1900, 3283, 3389, 3478, 3702, 5353, 5683, 10001, 11211, 47808]
    aggregate: { proto: exact, src: "/0", dst: "/128", src_port: exact, dst_port: all }
    rank: rate
    history:
      fine: { resolution: 1s, duration: 10m }
      max_instances: 100
    trigger:
      terms:
        rate: { metric: bps, window: 10s }
      expr: "rate > 100000000"
      sustained: 10s
    flowspec: { action: drop, ttl: 600s, refresh: true }
    description: "udp reflection to {{dst}} sport={{src_port}}, bps={{rate}}"

  # Extreme amplifiers (CharGEN 19, QOTD 17, memcached 11211): a lower floor so
  # they are not hidden behind the generic 100 Mbps threshold.
  - name: udp-reflection-amp-ipv4
    match:
      family: ipv4
      proto: udp
      src_port: [17, 19, 11211]
    aggregate: { proto: exact, src: "/0", dst: "/32", src_port: exact, dst_port: all }
    rank: rate
    history:
      fine: { resolution: 1s, duration: 10m }
      max_instances: 50
    trigger:
      terms:
        rate: { metric: bps, window: 10s }
      expr: "rate > 50000000"
      sustained: 10s
    flowspec: { action: drop, ttl: 600s, refresh: true }
    description: "high-amplification udp reflection to {{dst}} sport={{src_port}}, bps={{rate}}"

  - name: udp-reflection-amp-ipv6
    match:
      family: ipv6
      proto: udp
      src_port: [17, 19, 11211]
    aggregate: { proto: exact, src: "/0", dst: "/128", src_port: exact, dst_port: all }
    rank: rate
    history:
      fine: { resolution: 1s, duration: 10m }
      max_instances: 50
    trigger:
      terms:
        rate: { metric: bps, window: 10s }
      expr: "rate > 50000000"
      sustained: 10s
    flowspec: { action: drop, ttl: 600s, refresh: true }
    description: "high-amplification udp reflection to {{dst}} sport={{src_port}}, bps={{rate}}"
