# Predefined: UDP reflection/amplification. A reflector answers a spoofed request
# with a large response aimed at the victim, so on the wire we see
# `udp, src_port = <service port>, dst = victim`. Identity is the VICTIM (dst);
# the source (reflector) is irrelevant and varies. Trigger on bits/sec (the
# defining trait of amplification is volume), and emit a precise drop of
# "udp src_port <service> -> victim" so only the attack vector is shed.
#
# bps thresholds are per-victim and sampled; tune to your link sizes.
rules:
  - name: dns-reflection
    match: { family: ipv4, proto: udp, src_port: 53 }
    aggregate: { proto: exact, src: "/0", dst: "/32", src_port: exact, dst_port: all }
    history:
      fine: { resolution: 1s, duration: 10m }
      medium: { resolution: 1m, duration: 1d }
      max_instances: 20
    trigger:
      terms:
        rate: { metric: bps, window: 10s }
      expr: "rate > 100000000"   # 100 Mbps to one victim from udp/53
      sustained: 10s
    flowspec: { action: drop, ttl: 600s, refresh: true }
    description: "dns reflection to {{dst}}, bps={{rate}}"

