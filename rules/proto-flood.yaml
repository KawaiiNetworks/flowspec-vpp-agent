# Predefined: non-TCP/UDP transport floods aimed at a victim. Identity is the
# VICTIM (dst); the whole protocol is dropped to that host, so these are coarse and
# carry a small instance pool (max_instances: 20). GRE is ranked/triggered on
# packet rate, ESP (IPsec, large packets) on bandwidth.
rules:
  - name: gre-flood-ipv4
    match: { family: ipv4, proto: "47" }
    aggregate: { proto: exact, src: "/0", dst: "/32" }
    rank: pps
    history:
      fine: { resolution: 1s, duration: 10m }
      max_instances: 20
    trigger:
      terms:
        pps: { metric: pps, window: 10s }
      expr: "pps > 100000"
      sustained: 10s
    flowspec: { action: drop, ttl: 300s, refresh: true }
    description: "gre flood to {{dst}}, pps={{pps}}"

  - name: gre-flood-ipv6
    match: { family: ipv6, proto: "47" }
    aggregate: { proto: exact, src: "/0", dst: "/128" }
    rank: pps
    history:
      fine: { resolution: 1s, duration: 10m }
      max_instances: 20
    trigger:
      terms:
        pps: { metric: pps, window: 10s }
      expr: "pps > 100000"
      sustained: 10s
    flowspec: { action: drop, ttl: 300s, refresh: true }
    description: "gre flood to {{dst}}, pps={{pps}}"

  - name: esp-flood-ipv4
    match: { family: ipv4, proto: "50" }
    aggregate: { proto: exact, src: "/0", dst: "/32" }
    rank: rate
    history:
      fine: { resolution: 1s, duration: 10m }
      max_instances: 20
    trigger:
      terms:
        rate: { metric: bps, window: 10s }
      expr: "rate > 1000000000"
      sustained: 10s
    flowspec: { action: drop, ttl: 300s, refresh: true }
    description: "esp bandwidth flood to {{dst}}, bps={{rate}}"

  - name: esp-flood-ipv6
    match: { family: ipv6, proto: "50" }
    aggregate: { proto: exact, src: "/0", dst: "/128" }
    rank: rate
    history:
      fine: { resolution: 1s, duration: 10m }
      max_instances: 20
    trigger:
      terms:
        rate: { metric: bps, window: 10s }
      expr: "rate > 1000000000"
      sustained: 10s
    flowspec: { action: drop, ttl: 300s, refresh: true }
    description: "esp bandwidth flood to {{dst}}, bps={{rate}}"
