# Predefined: TCP SYN flood (small ~60B packets, SYN set / ACK clear, high pps,
# spoofed sources) aimed at a victim. Identity is the VICTIM (dst). The emitted
# FlowSpec drops only SYN (tcp_flags defaults to the match filter "syn !ack"), so
# established connections to the victim survive — new connections do not, the
# inherent tradeoff of dropping SYNs at L3/L4.
rules:
  - name: syn-flood-ipv4
    match: { family: ipv4, proto: tcp, tcp_flags: "syn !ack" }
    aggregate: { proto: exact, src: "/0", dst: "/32", src_port: all, dst_port: all }
    rank: pps
    history:
      fine: { resolution: 1s, duration: 10m }
      medium: { resolution: 1m, duration: 1d }
      max_instances: 100
    trigger:
      terms:
        pps: { metric: pps, window: 10s }
      expr: "pps > 20000"   # 20 k SYN/s to one victim
      sustained: 10s
    flowspec: { action: drop, ttl: 300s, refresh: true }
    description: "syn flood to {{dst}}, pps={{pps}}"

  - name: syn-flood-ipv6
    match: { family: ipv6, proto: tcp, tcp_flags: "syn !ack" }
    aggregate: { proto: exact, src: "/0", dst: "/128", src_port: all, dst_port: all }
    rank: pps
    history:
      fine: { resolution: 1s, duration: 10m }
      medium: { resolution: 1m, duration: 1d }
      max_instances: 100
    trigger:
      terms:
        pps: { metric: pps, window: 10s }
      expr: "pps > 20000"
      sustained: 10s
    flowspec: { action: drop, ttl: 300s, refresh: true }
    description: "syn flood to {{dst}}, pps={{pps}}"
