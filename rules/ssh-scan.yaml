# Predefined: detect TCP scanning of port 22 from a single source and block ALL
# traffic from that source. One rule per address family. Enable with
# local_detector.rules_enabled: [ssh-scan-ipv4, ssh-scan-ipv6].
#
# Every match and aggregate field is written out (including the pass-through
# defaults) so the instance identity is explicit:
#   - match     selects which packets are counted (tcp -> port 22).
#   - aggregate sets the descriptor granularity. src/32 makes the scanning host
#     the identity; everything else is aggregated away (dst/0, proto all, ports
#     all) so a single source is one instance regardless of who/what it scanned.
# Because proto and ports are aggregated to "all", the emitted FlowSpec blocks
# every protocol and port from the source, not just tcp/22.
rules:
  - name: ssh-scan-ipv4
    match:
      family: ipv4
      proto: tcp
      dst_port: 22
    aggregate:
      proto: all      # identity ignores protocol; emit blocks all protocols
      src: "/32"      # identity = the scanning source host
      dst: "/0"       # all destinations collapse into one instance
      src_port: all
      dst_port: all
    history:
      fine: { resolution: 1s, duration: 10m }
      medium: { resolution: 1m, duration: 1d }
      max_instances: 200
    trigger:
      terms:
        rate: { metric: pps, window: 30s }
      expr: "rate > 1000"
      sustained: 30s
    flowspec:
      action: drop
      ttl: 600s
      refresh: true
      # family/src_prefix default from the descriptor (ipv4, src/32); proto and
      # ports default to wildcard because they were aggregated to "all".
    description: "ssh scan (ipv4) from {{src}}, pps={{rate}}"

  - name: ssh-scan-ipv6
    match:
      family: ipv6
      proto: tcp
      dst_port: 22
    aggregate:
      proto: all
      src: "/128"     # identity = the scanning source host (use /64 for the subnet)
      dst: "/0"
      src_port: all
      dst_port: all
    history:
      fine: { resolution: 1s, duration: 10m }
      medium: { resolution: 1m, duration: 1d }
      max_instances: 200
    trigger:
      terms:
        rate: { metric: pps, window: 30s }
      expr: "rate > 1000"
      sustained: 30s
    flowspec:
      action: drop
      ttl: 600s
      refresh: true
    description: "ssh scan (ipv6) from {{src}}, pps={{rate}}"
