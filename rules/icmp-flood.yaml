# Predefined: ICMP flood (ping flood) aimed at a victim. Identity is the VICTIM
# (dst). Triggers on packets/sec and drops ICMP to the victim. ICMP has no ports,
# so the emitted rule is simply "drop icmp -> victim".
rules:
  - name: icmp-flood-ipv4
    match: { family: ipv4, proto: icmp }
    aggregate: { proto: exact, src: "/0", dst: "/32" }   # ICMP has no ports; they don't apply
    rank: pps
    history:
      fine: { resolution: 1s, duration: 10m }
      medium: { resolution: 1m, duration: 1d }
      max_instances: 100
    trigger:
      terms:
        pps: { metric: pps, window: 10s }
      expr: "pps > 20000"     # 20 k ICMP/s to one victim
      sustained: 10s
    flowspec: { action: drop, ttl: 300s, refresh: true }
    description: "icmp flood to {{dst}}, pps={{pps}}"

  - name: icmp-flood-ipv6
    match: { family: ipv6, proto: icmpv6 }
    aggregate: { proto: exact, src: "/0", dst: "/128" }  # ICMP has no ports; they don't apply
    rank: pps
    history:
      fine: { resolution: 1s, duration: 10m }
      medium: { resolution: 1m, duration: 1d }
      max_instances: 100
    trigger:
      terms:
        pps: { metric: pps, window: 10s }
      expr: "pps > 20000"     # 20 k ICMP/s to one victim
      sustained: 10s
    flowspec: { action: drop, ttl: 300s, refresh: true }
    description: "icmpv6 flood to {{dst}}, pps={{pps}}"
