# Deployment for flowspec-vpp-agent (§19). The agent runs in a container; VPP runs
# on the host (or its own container). They communicate over the VPP binary API
# unix socket under /run/vpp — a single bind mount covers both api.sock and
# stats.sock. No network is required between them.
services:
  flowspec-vpp-agent:
    image: kawaiinetworks/flowspec-vpp-agent:main
    restart: unless-stopped

    # On stop the agent catches SIGTERM, dumps state (persist) and removes its VPP
    # ACLs before exiting. Give it headroom over Docker's 10s default so a slow VPP
    # cleanup (bounded 5s) plus a Telegram flush can finish before SIGKILL.
    stop_grace_period: 30s

    # VPP binary API + stats socket both live under /run/vpp.
    volumes:
      - /run/vpp:/run/vpp:z          # podman + SELinux needs :z; plain docker can drop it
      # Mount the whole config directory; the agent reads config.yaml inside it.
      # Writable (no :ro) so the agent can persist its state dump next to the
      # config (persist.dump by default; see the top-level `persist:` setting).
      # podman + SELinux: add :z if you hit denials on the now-writable mount.
      - ./config:/etc/flowspec-vpp-agent

    # The embedded GoBGP speaker must be reachable by FlowSpec peers; host
    # networking puts the BGP listen port (default 10179) directly on the host
    # while the socket still travels over the bind mount.
    network_mode: host

    # Access the root-owned api.sock. Infrastructure agent runs as root (§19.3).
    user: "0:0"

    # With metrics.listen unset (the default), this is a no-op. If you enable the
    # optional metrics/health listener, it probes the local /healthz endpoint.
    healthcheck:
      test: ["CMD", "/flowspec-vpp-agent", "healthcheck"]
      interval: 30s
      timeout: 5s

    # If you prefer bridge isolation over host networking, drop network_mode and
    # publish the BGP port instead (the /run/vpp mount is unchanged):
    #   ports:
    #     - "10179:10179"
