vpp:
  socket: /run/vpp/api.sock
  stats_socket: /run/vpp/stats.sock

metrics:
  listen: "0.0.0.0:9469"

detector:
  dry_run: true
  rules_enabled:
    - dns-reflection
    - ntp-reflection
    - memcached-reflection
    - udp-flood-ipv4
    - syn-flood-ipv4
    - icmp-flood-ipv4
    - ssh-scan-ipv4
  sflow:
    listen: "0.0.0.0:6343"
  vpp_stats:
    interval: 1s
