# flowspec-vpp-agent — full configuration reference (§19.2).
# Each field is set to its default and annotated: [required] / [opt] with the
# omitted behavior. Need at least one of bgp.peers or detector.enabled:true.
# Minimal detector-only config: see config.simple.yaml.

vpp:                                 # [opt] VPP connection sockets; defaults below work as-is
  socket: /run/vpp/api.sock          # [opt] default; must be non-empty
  stats_socket: /run/vpp/stats.sock  # [opt] default; only used by detector.vpp_stats

bgp:                                 # [opt] embedded BGP speaker; runs only when peers is non-empty
  listen: "0.0.0.0:10179"            # [opt] default; speaker listen host:port
  router_id: "192.0.2.1"             # [req if peers] IPv4; unused without peers
  asn: 65000                         # [req if peers] local AS; default 0 (unusable)
  peers:                             # [opt] empty -> BGP disabled
    - address: "198.51.100.1"        # [req] valid IP
      peer_asn: 65001                # [req] non-zero
      port: 0                        # [opt] default 0 = BGP default port
      passive: true                  # [opt] default false; listen-only
      receive: true                  # [opt] default true; import its FlowSpec to VPP + relay
      send: false                    # [opt] default false; advertise our table to it
    - address: "203.0.113.1"         # [req] second peer: an upstream we advertise to
      peer_asn: 65000                # [req] non-zero
      receive: false                 # don't import this upstream's FlowSpec
      send: true                     # advertise our table to it

acl:                                 # [opt] where Managed ACLs attach (local policy)
  interfaces:                        # [opt] interface selection + direction
    mode: all                        # [opt] default "all"; or "list"
    list: []                         # [req if mode=list] interface names; else ignored
    direction: ingress               # [opt] default "ingress"; or "egress"

metrics:                             # [opt] HTTP endpoint
  listen: ""                         # [opt] default "" = HTTP disabled; set host:port for /metrics,/healthz,/status

detector:                            # [opt] sFlow/VPP-stats detector
  enabled: true                      # [opt] default false; false -> detector off
  dry_run: false                     # [opt] default false; true -> log only, no ACL/announce
  rules_dir: /etc/flowspec-vpp-agent/rules  # [opt] default ""; user rules override built-ins
  rules_enabled:                     # [req if enabled] non-empty; rule names to activate
    - dns-reflection                 # built-in: DNS reflection
    - ntp-reflection                 # built-in: NTP reflection
    - memcached-reflection           # built-in: memcached reflection
    - udp-flood-ipv4                 # built-in: UDP flood (v4)
    - syn-flood-ipv4                 # built-in: TCP SYN flood (v4)
    - icmp-flood-ipv4                # built-in: ICMP flood (v4)
    - ssh-scan-ipv4                  # built-in: SSH scan (v4)
  sflow:                             # [opt] sFlow collector
    listen: "0.0.0.0:6343"           # [req if enabled] default; sFlow v5 UDP host:port
  vpp_stats:                         # [opt] VPP interface counter polling
    enabled: true                    # [opt] default true; false -> vpp.ingress.* read 0
    interval: 1s                     # [opt] default 1s; must be >0 when enabled
  sample_queue: 65536                # [opt] default 65536; >0; overflow drops samples
  event_queue: 1024                  # [opt] default 1024; >0

log:                                 # [opt] logging
  level: info                        # [opt] default "info"; debug|info|warn|error
  format: text                       # [opt] default "text"; text|json

# Rule files (built-in or under detector.rules_dir) hold one or more rules. See
# docs/en/configuration.md for the full rule reference.
