# flowspec-vpp-agent — full configuration reference (§19.2).
# Each field is set to its default and annotated: [required] / [opt] with the
# omitted behavior. Need at least one of bgp.peers or a detector section.
# Minimal detector-only config: see config.simple.yaml.

vpp:                                 # [opt] VPP connection sockets; defaults below work as-is
  socket: /run/vpp/api.sock          # [opt] default; must be non-empty
  stats_socket: /run/vpp/stats.sock  # [opt] default; only used by detector.vpp_stats

bgp:                                 # [opt] embedded BGP speaker; runs only when peers is non-empty
  listen: "0.0.0.0:10179"            # [opt] default; speaker listen host:port
  router_id: "192.0.2.1"             # [req if peers] IPv4; unused without peers
  asn: 65000                         # [req if peers] local AS; default 0 (unusable)
  peers:                             # [opt] empty -> BGP disabled
    - address: "198.51.100.1"        # [req] valid IP
      peer_asn: 65001                # [req] non-zero
      port: 0                        # [opt] default 0 = BGP default port
      passive: true                  # [opt] default false; listen-only
      receive: true                  # [opt] default true; import its FlowSpec to VPP + relay
      send: false                    # [opt] default false; advertise our table to it
    - address: "203.0.113.1"         # [req] second peer: an upstream we advertise to
      peer_asn: 65000                # [req] non-zero
      receive: false                 # don't import this upstream's FlowSpec
      send: true                     # advertise our table to it

acl:                                 # [opt] where Managed ACLs attach (local policy)
  interfaces:                        # [opt] interface selection + direction
    mode: all                        # [opt] default "all"; or "list"
    list: []                         # [req if mode=list] interface names; else ignored
    direction: ingress               # [opt] default "ingress"; or "egress"

metrics:                             # [opt] HTTP endpoint
  listen: ""                         # [opt] default "" = HTTP disabled; set host:port for /metrics,/healthz,/status

detector:                            # [opt] sFlow/VPP-stats detector; PRESENCE enables it (no enabled flag)
  dry_run: false                     # [opt] default false; true -> log only, no ACL/announce
  rules_dir: /etc/flowspec-vpp-agent/rules  # [opt] default ""; user rules override built-ins by name
  builtin_rules: true                # [opt] default true; auto-enable every embedded built-in rule
  rules_enabled: []                  # [opt] extra rule names to merge in (e.g. rules_dir rules);
                                     #       set builtin_rules:false + list here to run a subset of built-ins
  collector:                         # sample source: set EXACTLY ONE of sflow / psample
    sflow:                           # sFlow v5 over UDP (hsflowd or any sFlow agent)
      listen: "0.0.0.0:6343"         # [opt] default; sFlow v5 UDP host:port
    # psample:                       # alternative: Linux netlink PSAMPLE (VPP native sflow plugin)
    #   group: 0                     # [opt] PSAMPLE sample-group to accept (match VPP; 0 = any)
  vpp_stats:                         # [opt] PRESENCE enables VPP counter polling; omit to disable
    interval: 1s                     # [opt] default 1s; 0/omitted -> 1s
    fine:   { resolution: 1s, duration: 5m }   # [opt] history rings (like a rule's history);
    medium: { resolution: 1m, duration: 1d }   #       windowed vpp.* terms aggregate over these;
    coarse: { resolution: 1h, duration: 30d }  #       a 0 field uses the built-in default
  sample_queue: 65536                # [opt] default 65536; 0 -> default; overflow drops samples
  event_queue: 1024                  # [opt] default 1024; 0 -> default

persist: ""                          # [opt] default ""=<config dir>/persist.dump; detector state (rule history + vpp stats),
                                     #       saved on exit & reloaded on start. A removed/changed rule (any field, incl.
                                     #       max_instances) or changed vpp_stats rings reloads nothing for that entry.

log:                                 # [opt] logging sinks; omit entirely => stderr only (info/all/text)
  stderr:                            # [opt] default sink, always active; omit => info/all/text
    level: info                      # [opt] default info; debug|info|warn|error
    scope: all                       # [opt] default all; or "none" | <scope> | [<scope>, ...]
    format: text                     # [opt] default text; text|json
  # telegram:                        # [opt] present => enabled; batches logs to a Telegram chat
  #   bot_token: "123456:ABC-DEF"    # [req] BotFather token — SECRET; keep out of shared configs
  #   chat_id: "-1001234567890"      # [req] target chat/channel id
  #   level: info                    # [opt] default info
  #   scope: [detector, acl]         # [opt] default all; here: only detector events + ACL changes
  #   format: text                   # [opt] default text; text|json
  # scopes: core | bgp | acl | vpp | detector  (acl = FlowSpec rule apply/withdraw/update)

# Rule files (built-in or under detector.rules_dir) hold one or more rules. See
# docs/en/configuration.md for the full rule reference.
